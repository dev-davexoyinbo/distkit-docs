<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="0.6" stop-color="#0E0B08"/>
      <stop offset="1" stop-color="#1A1206"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1010 150) rotate(120) scale(420)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="3" y="3" width="1194" height="624" rx="22" stroke="#F97316" stroke-opacity="0.18" stroke-width="2"/>

  <!-- mark + wordmark -->
  <g transform="translate(96 196)">
    <g stroke="#F97316" stroke-width="7" stroke-linecap="round">
      <line x1="14" y1="20" x2="74" y2="20"/>
      <line x1="14" y1="20" x2="44" y2="70"/>
      <line x1="74" y1="20" x2="44" y2="70"/>
    </g>
    <circle cx="14" cy="20" r="13" fill="#FAFAFA"/>
    <circle cx="44" cy="70" r="13" fill="#FAFAFA"/>
    <circle cx="74" cy="20" r="13" fill="#F97316"/>

    <text x="118" y="66" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="104" font-weight="800" letter-spacing="-3">
      <tspan fill="#FAFAFA">dist</tspan><tspan fill="#F97316">kit</tspan>
    </text>
  </g>

  <!-- tagline -->
  <text x="98" y="360" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="500" fill="#D4D4D4">Distributed systems primitives for Rust,</text>
  <text x="98" y="412" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="500" fill="#D4D4D4">backed by <tspan fill="#FB923C">Redis</tspan>.</text>

  <!-- feature chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="600">
    <g transform="translate(98 470)">
      <rect width="184" height="50" rx="25" fill="#F97316" fill-opacity="0.12" stroke="#F97316" stroke-opacity="0.35"/>
      <text x="92" y="33" text-anchor="middle" fill="#FDBA74">Counters</text>
    </g>
    <g transform="translate(298 470)">
      <rect width="332" height="50" rx="25" fill="#F97316" fill-opacity="0.12" stroke="#F97316" stroke-opacity="0.35"/>
      <text x="166" y="33" text-anchor="middle" fill="#FDBA74">Instance-aware counters</text>
    </g>
    <g transform="translate(646 470)">
      <rect width="120" height="50" rx="25" fill="#F97316" fill-opacity="0.12" stroke="#F97316" stroke-opacity="0.35"/>
      <text x="60" y="33" text-anchor="middle" fill="#FDBA74">Locks</text>
    </g>
    <g transform="translate(782 470)">
      <rect width="220" height="50" rx="25" fill="#F97316" fill-opacity="0.12" stroke="#F97316" stroke-opacity="0.35"/>
      <text x="110" y="33" text-anchor="middle" fill="#FDBA74">Rate limiting</text>
    </g>
  </g>

  <!-- footer line -->
  <text x="98" y="582" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="26" fill="#737373">cargo add distkit</text>
  <text x="1102" y="582" text-anchor="end" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="600" fill="#A3A3A3">distkit.davidoyinbo.com</text>
</svg>
